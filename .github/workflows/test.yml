name: test
on:
  push:

jobs:
  test:
    runs-on: ubuntu-24.04
    container: ros:jazzy-ros-base

    strategy:
      matrix:
        python-version: [3.10, 3.11, 3.12]
        cmake-version: [3.26, 3.27, 3.28] 

    steps:
      - uses: actions/checkout@v3

      - name: build and test
        shell: bash
        run: |
          #ワークスペース構造の構築
          mkdir -p /root/ros2_ws/src
          cp -r src/mypkg /root/ros2_ws/src/
          cp -r src/system_msgs /root/ros2_ws/src/

          #必要なツールと依存関係を直接インストール
          apt-get update
          apt-get install -y python3-colcon-common-extensions python3-pip

          #依存関係の解決
          cd /root/ros2_ws
          rosdep update
          
          rosdep install -i --from-path src --rosdistro jazzy -y -r

          #実行
          chmod +x src/mypkg/test/test.bash
          ./src/mypkg/test/test.bash /root
