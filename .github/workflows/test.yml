name: test
on:
  push:
jobs:
  test:
     runs-on: ubuntu-22.04
     container: ryuichiueda/ubuntu22.04-ros2:latest
    steps:
      - uses: actions/checkout@v3
      - name: build and test
        shell: bash
        run: |
          # ワークスペースの作成
          mkdir -p /root/ros2_ws/src
          
          # リポジトリ内の src 以下にある mypkg と system_msgs をコピー
          cp -r src/mypkg /root/ros2_ws/src/
          cp -r src/system_msgs /root/ros2_ws/src/
          
          # 依存関係のインストール (rosdep)
          cd /root/ros2_ws
          apt-get update
          rosdep update
          rosdep install -i --from-path src --rosdistro jazzy -y
          
          # テストスクリプトの実行
          # bash -x で詳細ログを出しつつ実行
          chmod +x src/mypkg/test/test.bash
          ./src/mypkg/test/test.bash /root
